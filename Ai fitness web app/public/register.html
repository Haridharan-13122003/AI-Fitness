<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Fitness</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">AI Fitness</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        <div class="card" style="width: 100%; max-width: 450px;">
            <h2>Register</h2>
            <p>New here? Create an account to get started.</p>
            <div id="reg-msg" class="message"></div>
            <form id="register-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="reg-username" class="form-control" required minlength="3">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="reg-password" class="form-control" required minlength="6">
                </div>
                <button type="submit" class="btn btn-outline" style="width: 100%">Register Account</button>
                <div style="text-align: center; margin-top: 1.5rem; font-weight: 500;">
                    <a href="login.html">Already have an account? Login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('reg-username').value;
            const p = document.getElementById('reg-password').value;

            try {
                const res = await fetch(API_URL + '/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();
                if(res.ok) {
                    showMessage('reg-msg', 'Registration successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showMessage('reg-msg', data.error, 'error');
                }
            } catch(err) {
                showMessage('reg-msg', 'Server error', 'error');
            }
        });
    </script>
</body>
</html>
